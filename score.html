<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎼 ScorePlayer - PDF楽譜アプリ</title>
    <!-- PDF.js CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --bg:      #0d0d14;
            --card:    #16162a;
            --card2:   #1e1e35;
            --border:  #2d2d50;
            --accent:  #7c3aed;
            --alight:  #a78bfa;
            --cyan:    #06b6d4;
            --green:   #10b981;
            --red:     #ef4444;
            --yellow:  #f59e0b;
            --orange:  #f97316;
            --text:    #e2e2f0;
            --muted:   #6b7280;
            --r:       10px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== TOP BAR ===== */
        #topbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-area h1 {
            font-size: 17px; font-weight: 700;
            background: linear-gradient(135deg, var(--alight), var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        /* Upload button in topbar */
        #upload-label {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--accent); border: none; color: #fff;
            border-radius: var(--r); padding: 7px 14px;
            cursor: pointer; font-size: 13px; font-weight: 600;
            white-space: nowrap; transition: background 0.15s;
        }
        #upload-label:hover { background: #6d28d9; }
        #pdf-input { position: absolute; width:1px; height:1px; opacity:0; pointer-events:none; }

        .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

        /* Page navigation */
        .nav-group { display: flex; align-items: center; gap: 6px; }
        .btn {
            background: var(--card2); border: 1px solid var(--border); color: var(--text);
            border-radius: 8px; padding: 6px 12px; cursor: pointer;
            font-size: 13px; transition: all 0.15s;
            display: inline-flex; align-items: center; gap: 5px;
            white-space: nowrap;
        }
        .btn:hover { background: var(--border); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-sm { padding: 5px 9px; font-size: 12px; }
        #page-info {
            font-family: monospace; font-size: 13px;
            color: var(--muted); white-space: nowrap;
        }
        #page-info span { color: var(--text); font-weight: 700; }
        #goto-input {
            width: 46px; background: var(--card2); border: 1px solid var(--border);
            color: var(--text); border-radius: 6px; padding: 5px 8px;
            font-size: 13px; text-align: center;
        }

        /* Zoom */
        .zoom-val {
            font-family: monospace; font-size: 12px;
            color: var(--alight); min-width: 40px; text-align: center;
        }

        /* ===== MAIN AREA ===== */
        #main-area {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Sidebar: section list */
        #sidebar {
            width: 160px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: width 0.2s;
            flex-shrink: 0;
        }
        #sidebar.collapsed { width: 0; }
        #sidebar-header {
            padding: 10px 12px;
            font-size: 11px; font-weight: 700;
            color: var(--muted); text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        #section-list {
            flex: 1; overflow-y: auto; padding: 8px;
        }
        .section-item {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 10px; border-radius: 7px;
            cursor: pointer; margin-bottom: 4px;
            font-size: 13px; transition: background 0.12s;
            background: var(--card2); border: 1px solid var(--border);
        }
        .section-item:hover { background: var(--border); }
        .section-item.active { border-color: var(--accent); background: rgba(124,58,237,0.15); }
        .section-page { font-size: 10px; color: var(--muted); margin-left: auto; white-space: nowrap; }
        .section-del {
            background: none; border: none; color: var(--muted);
            cursor: pointer; font-size: 12px; padding: 0 2px;
            flex-shrink: 0;
        }
        .section-del:hover { color: var(--red); }
        #add-section-form {
            padding: 8px;
            border-top: 1px solid var(--border);
            display: flex; flex-direction: column; gap: 6px;
        }
        #section-name-input {
            background: var(--card2); border: 1px solid var(--border);
            color: var(--text); border-radius: 6px; padding: 6px 8px;
            font-size: 12px; width: 100%;
        }

        /* Canvas area */
        #canvas-area {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            position: relative;
            background: #111118;
        }
        #canvas-wrapper {
            position: relative;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            border-radius: 4px;
            overflow: hidden;
        }
        #pdf-canvas {
            display: block;
            background: white;
        }
        /* Annotation overlay canvas */
        #annot-canvas {
            position: absolute;
            top: 0; left: 0;
            cursor: crosshair;
        }

        /* Countdown overlay */
        #countdown-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900;
            font-family: monospace;
            color: rgba(167,139,250,0.9);
            text-shadow: 0 0 30px var(--accent);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s;
            z-index: 10;
        }

        /* Upload prompt overlay */
        #upload-prompt {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--muted);
        }
        #upload-prompt .big-icon { font-size: 64px; }
        #upload-prompt p { font-size: 16px; }
        #upload-prompt strong { color: var(--alight); }
        #upload-prompt2 {
            background: var(--card2); border: 2px dashed var(--border);
            border-radius: var(--r); padding: 20px 32px;
            text-align: center; cursor: pointer; transition: all 0.2s;
        }
        #upload-prompt2:hover { border-color: var(--accent); background: rgba(124,58,237,0.05); }

        /* ===== BOTTOM PANEL ===== */
        #bottom-panel {
            background: var(--card);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            gap: 16px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        /* Metronome section */
        .panel-block {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 14px;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: var(--r);
        }
        .panel-label {
            font-size: 11px; font-weight: 700; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .bpm-val {
            font-family: monospace; font-size: 22px; font-weight: 800;
            color: var(--alight); min-width: 50px; text-align: center;
        }
        input[type="range"] {
            -webkit-appearance: none; height: 4px;
            background: var(--border); border-radius: 2px; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: var(--alight); cursor: pointer;
        }
        .beat-row { display: flex; gap: 6px; align-items: center; }
        .beat-dot {
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--border); transition: all 0.05s;
            flex-shrink: 0;
        }
        .beat-dot.accent { background: rgba(245,158,11,0.35); }
        .beat-dot.active { background: var(--green); transform: scale(1.4); }
        .beat-dot.accent.active { background: var(--alight); transform: scale(1.6); }
        /* page-turn warning flash */
        .beat-dot.warn { background: var(--orange) !important; transform: scale(1.3); }

        /* Auto-turn block */
        .at-setting { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
        .at-setting input[type="number"] {
            width: 44px; background: var(--card); border: 1px solid var(--border);
            color: var(--text); border-radius: 5px; padding: 4px 6px;
            font-size: 13px; text-align: center;
        }
        select.small-sel {
            background: var(--card); color: var(--text);
            border: 1px solid var(--border); border-radius: 5px;
            padding: 4px 6px; font-size: 12px; cursor: pointer;
        }

        /* Status bar */
        #status-bar {
            padding: 4px 16px;
            background: var(--bg);
            font-size: 11px; color: var(--muted);
            border-top: 1px solid var(--border);
            display: flex; gap: 16px; align-items: center;
            flex-shrink: 0;
        }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); }
        .status-dot.on { background: var(--green); }

        /* Draw toolbar */
        #draw-toolbar {
            display: flex; gap: 6px; align-items: center;
        }
        .color-btn {
            width: 18px; height: 18px; border-radius: 50%;
            border: 2px solid transparent; cursor: pointer;
            transition: transform 0.1s;
        }
        .color-btn.selected { border-color: #fff; transform: scale(1.25); }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* Toast */
        #toast {
            position: fixed; bottom: 80px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card2); border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 20px;
            font-size: 13px; color: var(--text);
            opacity: 0; transition: all 0.25s; pointer-events: none;
            z-index: 100; white-space: nowrap;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
    <div class="logo-area">
        <span style="font-size:22px">🎼</span>
        <h1>ScorePlayer</h1>
    </div>

    <label id="upload-label" for="pdf-input">📂 PDF を開く</label>
    <input type="file" id="pdf-input" accept=".pdf,application/pdf">

    <div class="sep"></div>

    <!-- Page Navigation -->
    <div class="nav-group">
        <button class="btn btn-sm" id="prev-btn" disabled>◀ 前</button>
        <div id="page-info">p.<span id="cur-page">—</span> / <span id="tot-page">—</span></div>
        <button class="btn btn-sm" id="next-btn" disabled>次 ▶</button>
        <input type="number" id="goto-input" placeholder="p." min="1" disabled>
        <button class="btn btn-sm" id="goto-btn" disabled>移動</button>
    </div>

    <div class="sep"></div>

    <!-- Zoom -->
    <div class="nav-group">
        <button class="btn btn-sm" id="zoom-out-btn">－</button>
        <span class="zoom-val" id="zoom-val">150%</span>
        <button class="btn btn-sm" id="zoom-in-btn">＋</button>
        <button class="btn btn-sm" id="zoom-fit-btn">フィット</button>
    </div>

    <div class="sep"></div>

    <!-- Draw tools -->
    <div id="draw-toolbar">
        <span style="font-size:11px;color:var(--muted)">✏️</span>
        <div class="color-btn selected" data-color="#ef4444" style="background:#ef4444"></div>
        <div class="color-btn" data-color="#f59e0b" style="background:#f59e0b"></div>
        <div class="color-btn" data-color="#10b981" style="background:#10b981"></div>
        <div class="color-btn" data-color="#60a5fa" style="background:#60a5fa"></div>
        <input type="range" id="pen-size" min="1" max="12" value="3" style="width:60px">
        <button class="btn btn-sm" id="erase-btn">消しゴム</button>
        <button class="btn btn-sm" id="clear-ann-btn">全消去</button>
    </div>

    <div class="sep"></div>

    <!-- Sidebar toggle -->
    <button class="btn btn-sm" id="sidebar-toggle-btn">☰ セクション</button>

    <!-- Fullscreen -->
    <button class="btn btn-sm" id="fullscreen-btn" style="margin-left:auto">⛶ 全画面</button>
</div>

<!-- MAIN AREA -->
<div id="main-area">
    <!-- Sidebar -->
    <div id="sidebar">
        <div id="sidebar-header">📑 セクション</div>
        <div id="section-list">
            <div style="font-size:12px;color:var(--muted);padding:8px;text-align:center">
                まだセクションがありません
            </div>
        </div>
        <div id="add-section-form">
            <input type="text" id="section-name-input" placeholder="セクション名 (例: イントロ)">
            <button class="btn btn-sm" id="add-section-btn">＋ 現在のページを追加</button>
        </div>
    </div>

    <!-- Canvas area -->
    <div id="canvas-area" id="drop-area">
        <!-- Upload prompt (shown when no PDF) -->
        <div id="upload-prompt">
            <div class="big-icon">🎼</div>
            <label id="upload-prompt2" for="pdf-input">
                <p><strong>クリック</strong>またはここに<strong>PDFをドロップ</strong></p>
                <p style="font-size:13px;margin-top:6px;color:var(--muted)">PDF形式の楽譜ファイルを読み込む</p>
            </label>
        </div>

        <!-- PDF canvas wrapper -->
        <div id="canvas-wrapper" style="display:none">
            <canvas id="pdf-canvas"></canvas>
            <canvas id="annot-canvas"></canvas>
            <div id="countdown-overlay"></div>
        </div>
    </div>
</div>

<!-- BOTTOM PANEL -->
<div id="bottom-panel">
    <!-- Metronome -->
    <div class="panel-block">
        <span class="panel-label">🥁 Metro</span>
        <span class="bpm-val" id="bpm-disp">120</span>
        <input type="range" id="bpm-slider" min="40" max="240" step="1" value="120" style="width:90px">
        <select class="small-sel" id="timesig-sel">
            <option value="2">2拍</option>
            <option value="3">3拍</option>
            <option value="4" selected>4拍</option>
            <option value="5">5拍</option>
            <option value="6">6拍</option>
            <option value="7">7拍</option>
        </select>
        <div class="beat-row" id="beat-row"></div>
        <button class="btn btn-sm" id="metro-btn">▶ 開始</button>
        <button class="btn btn-sm" id="tap-btn">👆 タップ</button>
    </div>

    <!-- Auto Page Turn -->
    <div class="panel-block">
        <span class="panel-label">📖 自動めくり</span>
        <div class="at-setting">
            <span>1ページ</span>
            <input type="number" id="mpp-input" value="4" min="1" max="64">
            <span>小節</span>
        </div>
        <div class="at-setting" style="font-size:11px;color:var(--muted)">
            (残り<span id="beats-left-disp" style="color:var(--alight);font-weight:700;margin:0 3px">—</span>拍でめくる)
        </div>
        <button class="btn btn-sm" id="autoturn-btn" disabled>▶ 自動めくり</button>
        <button class="btn btn-sm" id="reset-turn-btn">リセット</button>
    </div>

    <!-- Keyboard hints -->
    <div style="margin-left:auto;font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px;line-height:1.5">
        <span>⌨️ <b style="color:var(--text)">←/→</b> ページ送り　<b style="color:var(--text)">Space</b> Metro開始/停止</span>
        <span><b style="color:var(--text)">+/-</b> ズーム　<b style="color:var(--text)">F</b> 全画面　<b style="color:var(--text)">A</b> 自動めくり</span>
    </div>
</div>

<!-- STATUS BAR -->
<div id="status-bar">
    <div style="display:flex;align-items:center;gap:5px">
        <div class="status-dot" id="metro-dot"></div>
        <span>Metro</span>
    </div>
    <div style="display:flex;align-items:center;gap:5px">
        <div class="status-dot" id="autoturn-dot"></div>
        <span>自動めくり</span>
    </div>
    <span id="status-msg">PDFファイルを読み込んでください</span>
    <span style="margin-left:auto;font-size:10px">PDF.js powered</span>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="score.js"></script>
</body>
</html>
